id: de.haku.disc-printer
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: disc-printer

# The GNOME Platform 47 already provides:
#   - Python 3.12, pycairo, PyGObject (gi), GTK4, Cairo, Pango, libcups.so.2

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # CUPS socket → lp / lpstat / lpoptions can reach the host print daemon
  - --socket=cups
  # Home directory for saving/loading .discprint design files
  - --filesystem=home

modules:

  # ── 1. numpy ──────────────────────────────────────────────────────────────
  # Not in the GNOME Platform; needed for brightness/contrast adjustment.
  # Pre-built manylinux wheel for CPython 3.12 / x86_64.
  - name: python-numpy
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=. --prefix=/app
          numpy-2.2.6-cp312-cp312-manylinux_2_17_x86_64.manylinux2014_x86_64.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/8c/3d/1e1db36cfd41f895d266b103df00ca5b3cbe965184df824dec5c08c6b803/numpy-2.2.6-cp312-cp312-manylinux_2_17_x86_64.manylinux2014_x86_64.whl
        sha256: fd83c01228a688733f1ded5201c678f0c53ecc1006ffbc404db9f7a899ac6249

  # ── 2. CUPS client tools ──────────────────────────────────────────────────
  # The Platform already has libcups.so.2; we only need to build and install
  # the three client utilities: lp, lpstat, lpoptions.
  # make install writes correct RPATHs; we then prune everything but the
  # binaries and the shared library that the binaries link against.
  - name: cups-client-tools
    buildsystem: simple
    build-options:
      env:
        # Silence chatty build output
        MAKEFLAGS: -j4
    build-commands:
      - ./configure
          --prefix=/app
          --with-system-groups=lpadmin
          --disable-systemd
          --without-rcdir
          --disable-dbus
          --disable-pam
          --disable-avahi
          --disable-acl
          --disable-libusb
          --without-php
      - make -j4
      # install-exec installs binaries + libraries but skips data/desktop files
      # (avoids the CUPS desktop Makefile writing to read-only /usr/share)
      - make install-exec
      # ── Keep: lp, lpstat, lpoptions + libcups ──────────────────────────
      - |
        cd /app
        # Remove server daemon, backends, filters, scheduler extras
        rm -rf etc var sbin
        rm -rf lib/cups share/cups share/doc share/man
        # Remove unneeded client binaries (keep lp lpstat lpoptions)
        for b in cancel cupsaccept cupsreject cupstestppd ippfind ipptool \
                 lpc lpmove lpq lpr lprm reject; do
          rm -f bin/$b
        done
    sources:
      - type: archive
        url: https://github.com/OpenPrinting/cups/releases/download/v2.4.11/cups-2.4.11-source.tar.gz
        sha256: 9a88fe1da3a29a917c3fc67ce6eb3178399d68e1a548c6d86c70d9b13651fd71

  # ── 3. disc-printer ───────────────────────────────────────────────────────
  - name: disc-printer
    buildsystem: simple
    build-commands:
      # Compile gettext translation catalogues (.po → .mo)
      - make compile-mo
      # Install Python package into the runtime's site-packages
      - install -d /app/lib/python3.12/site-packages
      - cp -r src/disc_printer /app/lib/python3.12/site-packages/
      # Entry-point script
      - |
        install -d /app/bin
        cat > /app/bin/disc-printer << 'LAUNCHER'
        #!/usr/bin/python3
        import sys
        from disc_printer.gui.window import main
        sys.exit(main() or 0)
        LAUNCHER
        chmod 0755 /app/bin/disc-printer
      # Desktop integration
      - install -Dm644 de.haku.disc-printer.desktop
          /app/share/applications/de.haku.disc-printer.desktop
      - install -Dm644 de.haku.disc-printer.metainfo.xml
          /app/share/metainfo/de.haku.disc-printer.metainfo.xml
      - install -Dm644 de.haku.disc-printer.svg
          /app/share/icons/hicolor/scalable/apps/de.haku.disc-printer.svg
    sources:
      - type: archive
        url: https://github.com/MrHaku81/disc-printer/archive/refs/tags/v0.1.0.tar.gz
        sha256: b58a6355d4baf4d668a52c178c3efa5cde423ccd8f1d70202c6dbcd4614f2504
        strip-components: 1
      - type: file
        path: de.haku.disc-printer.desktop
      - type: file
        path: de.haku.disc-printer.metainfo.xml
      - type: file
        path: de.haku.disc-printer.svg
